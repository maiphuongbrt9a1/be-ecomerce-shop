version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: da-ecommerce-shop-postgres-17
    environment:
      POSTGRES_DB: da-ecommerce-shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - da-ecommerce-shop-backend-network

  redis:
    image: redis:8-alpine
    container_name: da-ecommerce-shop-redis-8
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - da-ecommerce-shop-backend-network

  dpage-pgadmin4:
    image: dpage/pgadmin4:9.13
    container_name: da-ecommerce-shop-pgadmin4-9.13
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.org
      PGADMIN_DEFAULT_PASSWORD: 1
    ports:
      - '5050:80'
    networks:
      - da-ecommerce-shop-backend-network
    depends_on:
      - postgres

networks:
  da-ecommerce-shop-backend-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
