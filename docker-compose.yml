services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '4000:4000'
      - '8080:80'
    restart: unless-stopped
    networks:
      - da-ecommerce-shop-backend-network

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-da-ecommerce-shop}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-da-ecommerce-shop}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - da-ecommerce-shop-backend-network

  redis:
    image: redis:8-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-MyStrongPassword123!@78963}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          'CMD',
          'redis-cli',
          '-a',
          '${REDIS_PASSWORD:-MyStrongPassword123!@78963}',
          'ping',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - da-ecommerce-shop-backend-network

  redis_insight:
    image: redis/redisinsight:3.2.0
    profiles: ['tools']
    restart: always
    user: root
    ports:
      - 5540:5540
    volumes:
      - redis_insight_volume_data:/data
    networks:
      - da-ecommerce-shop-backend-network

  dpage-pgadmin4:
    image: dpage/pgadmin4:9.13
    profiles: ['tools']
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - '5050:80'
    networks:
      - da-ecommerce-shop-backend-network
    depends_on:
      - postgres
    volumes:
      - pgadmin4_data:/var/lib/pgadmin

networks:
  da-ecommerce-shop-backend-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  redis_insight_volume_data:
  pgadmin4_data:
