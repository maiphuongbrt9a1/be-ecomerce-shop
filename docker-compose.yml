services:
  postgres:
    image: postgres:17
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - TZ=Asia/Ho_Chi_Minh
      - PGTZ=Asia/Ho_Chi_Minh
    command: ['postgres', '-c', 'timezone=Asia/Ho_Chi_Minh']
    container_name: da-ecommerce-shop-postgres
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - postgres_data_fresh:/var/lib/postgresql/data
      - ./prisma/seed-dump.sql:/docker-entrypoint-initdb.d/seed-dump.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 30s
      timeout: 30s
      retries: 15
    networks:
      - da-ecommerce-shop-backend-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: da-ecommerce-shop-backend-app
    env_file:
      - .env
    environment:
      - PORT=${PORT}
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      - REDIS_HOST=redis
      - TZ=Asia/Ho_Chi_Minh
    ports:
      - '${PORT}:${PORT}'
    depends_on:
      - postgres
      - redis
    volumes:
      - ./src:/app/src
    networks:
      - da-ecommerce-shop-backend-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/healthcheck']
      interval: 30s
      timeout: 30s
      retries: 15

  redis:
    image: redis:8
    container_name: da-ecommerce-shop-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - '${REDIS_PORT}:${REDIS_PORT}'
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 30s
      timeout: 30s
      retries: 15
    networks:
      - da-ecommerce-shop-backend-network

  redis_insight:
    image: redis/redisinsight:3.2.0
    container_name: da-ecommerce-shop-redis-insight
    restart: always
    user: root
    ports:
      - '${REDIS_INSIGHT_PORT}:${REDIS_INSIGHT_PORT}'
    volumes:
      - redis_insight_volume_data:/data
    networks:
      - da-ecommerce-shop-backend-network

  dpage-pgadmin4:
    image: dpage/pgadmin4:9.13
    restart: always
    container_name: da-ecommerce-shop-pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - '${PGADMIN_HOST_PORT}:${PGADMIN_CONTAINER_PORT}'
    networks:
      - da-ecommerce-shop-backend-network
    depends_on:
      - postgres
    volumes:
      - pgadmin4_data:/var/lib/pgadmin

networks:
  da-ecommerce-shop-backend-network:
    driver: bridge

volumes:
  postgres_data_fresh:
  redis_data:
  redis_insight_volume_data:
  pgadmin4_data:
