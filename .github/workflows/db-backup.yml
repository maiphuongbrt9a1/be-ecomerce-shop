name: Backup Database every 2 days

on:
  schedule:
    # Chạy lúc 0:00 UTC mỗi 2 ngày
    - cron: '0 0 */2 * *'
  workflow_dispatch: # Cho phép chạy tay để test

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Generate timestamp
        id: date
        run: echo "timestamp=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

      - name: Pull PostgreSQL client image
        run: docker pull postgres:18

      - name: Run pg_dump (custom format)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/backups:/backup \
            -e PGPASSWORD=${{ secrets.DB_PASSWORD }} \
            postgres:18 \
            pg_dump -h roundhouse.proxy.rlwy.net -p 40673 -U postgres -d railway \
              -F c -b -v -f /backup/db_custom_${{ steps.date.outputs.timestamp }}.dump

      - name: Run pg_dump (plain SQL)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/backups:/backup \
            -e PGPASSWORD=${{ secrets.DB_PASSWORD }} \
            postgres:18 \
            pg_dump -h roundhouse.proxy.rlwy.net -p 40673 -U postgres -d railway \
              -F p --encoding=UTF8 -v -f /backup/db_plain_${{ steps.date.outputs.timestamp }}.sql

      - name: Upload all backups as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ steps.date.outputs.timestamp }}
          path: backups/
